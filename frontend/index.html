<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayo Belajar!</title>
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font ramah anak (Quicksand) -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons untuk ikon-ikon sederhana -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #F0F9FF; /* Soft sky blue */
            /* Hindari text selection yang tidak disengaja */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* Menyembunyikan scrollbar bawaan di carousel namun tetap bisa di-scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animasi sederhana untuk tombol play */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .play-btn:hover {
            animation: pulse-soft 1s infinite;
        }

        /* Animasi dummy video "bermain" */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .playing-animation {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4 sm:px-8">

    <!-- Header Sederhana -->
    <header class="w-full max-w-4xl flex items-center justify-center mb-6">
        <div class="bg-white px-8 py-4 rounded-full shadow-md flex items-center gap-4 border-4 border-sky-200">
            <i class="ph-fill ph-star text-5xl text-yellow-400"></i>
            <h1 class="text-3xl md:text-4xl font-bold text-sky-800">Ayo Belajar!</h1>
            <i class="ph-fill ph-star text-5xl text-yellow-400"></i>
        </div>
    </header>

    <!-- Area Video Utama (Main Player) -->
    <main class="w-full max-w-4xl flex flex-col items-center">
        
        <!-- Judul Video Aktif -->
        <h2 id="active-title" class="text-2xl md:text-3xl font-bold text-slate-700 mb-4 bg-white px-6 py-2 rounded-2xl shadow-sm border-2 border-slate-100">
            Pilih Video Di Bawah
        </h2>

        <!-- Dummy Player Box -->
        <div id="video-player" class="w-full aspect-video bg-slate-300 rounded-3xl shadow-xl border-8 border-white overflow-hidden relative flex flex-col items-center justify-center transition-colors duration-500 cursor-pointer">
            
            <!-- Elemen ini akan berubah sesuai video yang dipilih -->
            <div id="player-content" class="flex flex-col items-center justify-center">
                <i id="player-icon" class="ph-fill ph-play-circle text-8xl text-white opacity-80 mb-4"></i>
                <span id="player-text" class="text-white text-2xl font-bold">Tekan untuk Mulai</span>
            </div>

            <!-- Tombol Play Besar Overlay -->
            <button id="play-button" class="play-btn absolute inset-0 flex items-center justify-center bg-black/20 hover:bg-black/10 transition-colors">
                <div class="bg-white text-sky-500 rounded-full w-24 h-24 flex items-center justify-center shadow-lg border-4 border-sky-200">
                    <i class="ph-fill ph-play text-5xl ml-2"></i>
                </div>
            </button>

        </div>

        <!-- Pemisah -->
        <div class="w-full h-1 bg-sky-200 rounded-full my-8"></div>

        <!-- Area Korsel (Carousel) Video -->
        <div class="w-full relative flex items-center">
            
            <!-- Tombol Kiri -->
            <button onclick="scrollCarousel(-1)" class="absolute left-0 z-10 -ml-4 md:-ml-6 bg-white border-4 border-sky-300 text-sky-500 hover:text-white hover:bg-sky-400 hover:scale-110 active:scale-95 transition-all w-16 h-16 rounded-full flex items-center justify-center shadow-lg" aria-label="Geser ke kiri">
                <i class="ph-bold ph-caret-left text-4xl"></i>
            </button>

            <!-- Track Korsel -->
            <div id="carousel-track" class="flex gap-6 overflow-x-auto no-scrollbar scroll-smooth w-full px-12 py-4 snap-x snap-mandatory">
                <!-- Item-item video akan diisi oleh JavaScript -->
            </div>

            <!-- Tombol Kanan -->
            <button onclick="scrollCarousel(1)" class="absolute right-0 z-10 -mr-4 md:-mr-6 bg-white border-4 border-sky-300 text-sky-500 hover:text-white hover:bg-sky-400 hover:scale-110 active:scale-95 transition-all w-16 h-16 rounded-full flex items-center justify-center shadow-lg" aria-label="Geser ke kanan">
                <i class="ph-bold ph-caret-right text-4xl"></i>
            </button>

        </div>
    </main>

    <script>
        // Data Dummy Video Pembelajaran
        // Dirancang dengan warna cerah dan ikon yang sangat mudah dikenali
        const videos = [
            {
                id: 1,
                title: "Belajar Angka",
                color: "bg-red-400",
                shadowColor: "shadow-red-200",
                icon: "ph-number-circle-one",
                emoji: "1️⃣"
            },
            {
                id: 2,
                title: "Hewan Lucu",
                color: "bg-emerald-400",
                shadowColor: "shadow-emerald-200",
                icon: "ph-cat",
                emoji: "🐱"
            },
            {
                id: 3,
                title: "Warna Warni",
                color: "bg-blue-400",
                shadowColor: "shadow-blue-200",
                icon: "ph-palette",
                emoji: "🎨"
            },
            {
                id: 4,
                title: "Bentuk",
                color: "bg-purple-400",
                shadowColor: "shadow-purple-200",
                icon: "ph-star",
                emoji: "⭐"
            },
            {
                id: 5,
                title: "Bernyanyi",
                color: "bg-pink-400",
                shadowColor: "shadow-pink-200",
                icon: "ph-music-notes",
                emoji: "🎵"
            },
            {
                id: 6,
                title: "Kendaraan",
                color: "bg-orange-400",
                shadowColor: "shadow-orange-200",
                icon: "ph-car",
                emoji: "🚗"
            }
        ];

        let activeVideoId = null;
        let isPlaying = false;

        const carouselTrack = document.getElementById('carousel-track');
        const playerBox = document.getElementById('video-player');
        const activeTitle = document.getElementById('active-title');
        const playerContent = document.getElementById('player-content');
        const playButton = document.getElementById('play-button');

        // Fungsi untuk me-render daftar video di korsel
        function renderCarousel() {
            carouselTrack.innerHTML = '';
            
            videos.forEach(video => {
                const isActive = video.id === activeVideoId;
                
                // Membuat elemen kartu video
                const card = document.createElement('button');
                card.className = `flex-none w-48 h-48 md:w-56 md:h-56 snap-center rounded-3xl flex flex-col items-center justify-center gap-4 transition-all duration-300 transform outline-none focus:outline-none ${video.color} text-white shadow-lg ${video.shadowColor} border-8 ${isActive ? 'border-white scale-105 shadow-2xl' : 'border-transparent hover:scale-105 opacity-80 hover:opacity-100'}`;
                card.onclick = () => selectVideo(video.id);

                card.innerHTML = `
                    <i class="ph-fill ${video.icon} text-6xl md:text-7xl drop-shadow-md"></i>
                    <span class="text-xl md:text-2xl font-bold drop-shadow-md text-center px-2 leading-tight">${video.title}</span>
                `;
                
                carouselTrack.appendChild(card);
            });
        }

        // Fungsi ketika video dipilih dari korsel
        function selectVideo(id) {
            const video = videos.find(v => v.id === id);
            if (!video) return;

            activeVideoId = id;
            isPlaying = false; // Reset status bermain

            // Update Judul
            activeTitle.innerHTML = `Sekarang Menonton: <span class="text-${video.color.replace('bg-', '')}">${video.title}</span>`;
            
            // Update Tampilan Player (kembali ke state awal/Thumbnail)
            playerBox.className = `w-full aspect-video ${video.color} rounded-3xl shadow-xl border-8 border-white overflow-hidden relative flex flex-col items-center justify-center transition-colors duration-500 cursor-pointer`;
            
            playerContent.innerHTML = `
                <i class="ph-fill ${video.icon} text-8xl text-white opacity-90 drop-shadow-lg mb-4"></i>
            `;
            
            // Tampilkan tombol play
            playButton.classList.remove('hidden');

            renderCarousel();
        }

        // Fungsi untuk simulasi memutar video
        function playDummyVideo() {
            if (!activeVideoId) {
                // Beri animasi goyang sedikit jika belum pilih video
                playerBox.classList.add('animate-bounce');
                setTimeout(() => playerBox.classList.remove('animate-bounce'), 1000);
                activeTitle.innerText = "Pilih video di bawah dulu ya!";
                activeTitle.classList.add('text-red-500');
                setTimeout(() => activeTitle.classList.remove('text-red-500'), 2000);
                return;
            }

            if(isPlaying) return; // Jika sudah main, biarkan saja
            
            isPlaying = true;
            const video = videos.find(v => v.id === activeVideoId);

            // Sembunyikan tombol play
            playButton.classList.add('hidden');

            // Ubah konten player menjadi animasi dummy "sedang memutar"
            playerContent.innerHTML = `
                <div class="playing-animation flex flex-col items-center">
                    <span class="text-8xl md:text-9xl drop-shadow-xl mb-6">${video.emoji}</span>
                    <div class="bg-black/20 text-white px-8 py-3 rounded-full text-2xl font-bold backdrop-blur-sm animate-pulse">
                        Hore! Sedang Belajar ${video.title}...
                    </div>
                </div>
            `;
        }

        // Event listener untuk tombol play utama
        playButton.addEventListener('click', (e) => {
            e.stopPropagation(); // Mencegah klik tembus ke container
            playDummyVideo();
        });
        
        playerBox.addEventListener('click', () => {
            if(!isPlaying) playDummyVideo();
        });

        // Fungsi untuk menggulir korsel ke kiri/kanan
        function scrollCarousel(direction) {
            // Lebar satu kartu + gap kira-kira
            const scrollAmount = 240; 
            carouselTrack.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        // Inisialisasi awal
        // Pilih video pertama secara otomatis saat halaman dimuat
        selectVideo(videos[0].id);

    </script>
</body>
</html>
